<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋游戏</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>五子棋</h1>
        <div class="game-info">
            <p id="status">当前玩家: <span class="current-player">黑棋</span></p>
            <div class="buttons">
                <button id="undoBtn">悔棋</button>
                <button id="restartBtn">重新开始</button>
            </div>
        </div>
        <div id="board"></div>
        <div class="instructions">
            <p>游戏规则：先连成五子（横、竖、斜）的一方获胜</p>
        </div>
    </div>
    <script type="module" src="game.js"></script>
</body>
</html>
